<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rox Trading | Forex & Gold</title>
    <style>
        /* Les styles CSS commencent ici */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; /* Fond noir profond */
            color: #e0e0e0; /* Texte gris clair pour le contraste */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background-color: #1e1e1e; /* Fond un peu plus clair pour la boîte */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); /* Ombre pour l'effet de relief */
            max-width: 400px;
        }

        h1 {
            color: #4caf50; /* Titre en vert vibrant (couleur "Achat" !) */
            margin-top: 0;
        }

        p {
            line-height: 1.6;
        }

        .highlight {
            font-weight: bold;
            color: #ff9800; /* Orange vif pour les mots-clés */
        }

        /* Style du bouton */
        .btn {
            display: inline-block;
            background-color: #2196f3; /* Bleu pour le bouton */
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 20px;
            transition: background-color 0.3s ease; /* Transition douce pour l'effet de survol */
        }

        /* Effet de survol du bouton */
        .btn:hover {
            background-color: #1976d2; /* Bleu plus foncé au survol */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bienvenue chez Rox Bior Trading</h1>
        <p>Expertise et Passion pour le <span class="highlight">Forex</span> et le <span class="highlight">Gold (XAUUSD)</span>.</p>
        <p>Mon robot Telegram est prêt à t'accompagner. Clique ci-dessous !</p>
        
        <a href="https://t.me/Mon_telegramBior9_bot" class="btn">🚀 Rejoins mon Bot Telegram</a>
    </div>
</body>
</html>
