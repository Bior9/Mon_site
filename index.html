<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rox Bior Trading | Forex & Gold</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            position: relative;
            width: 90%;
            max-width: 450px;
            min-height: 400px;
            /* --- PARTIE NOM DE L'IMAGE --- */
            background-image: url('1000090839.jpg'); 
            /* ---------------------------- */
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
        }

        h1 {
            color: #4caf50;
            font-size: 26px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        p {
            font-size: 16px;
            color: #d1d1d1;
            margin-bottom: 20px;
        }

        .highlight {
            color: #ff9800;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #2196f3, #0056b3);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="overlay"></div>
        
        <div class="content">
            <h1>Rox Bior Trading</h1>
            <p>Expertise <span class="highlight">Forex</span> & <span class="highlight">Gold (XAUUSD)</span></p>
            <p>Mon robot Telegram est prêt à t'accompagner.</p>
            
            <a href="https://bior9.github.io/Mon_site/" class="btn">🚀 Rejoindre le Bot</a>
        </div>
    </div>

</body>
</html>
